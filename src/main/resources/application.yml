server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/reservation?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: app123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update       # 엔티티 기반으로 테이블 자동 생성/업데이트
    show-sql: true           # 실행 SQL 로그 출력
    properties:
      hibernate.format_sql: true
      jdbc.lob.non_contextual_creation: true  # BLOB/CLOB 오류 예방용

logging:
  level:
    org.hibernate.SQL: debug       # 실제 SQL 로그 출력
    org.hibernate.type.descriptor.sql.BasicBinder: trace  # 파라미터 바인딩 확인